<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Kiosk</title>
    <style>
        :root { --primary: #4F46E5; --bg: #F3F4F6; --card: #FFFFFF; --text: #1F2937; --gcash: #007EE5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .wallet-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        input[type=tel] { font-weight: bold; font-size: 18px; letter-spacing: 2px; border: 2px solid var(--gcash); }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; transition: 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-in { background: var(--gcash); }
        .btn-out { background: #1F2937; }
        .btn-cancel { background: #E5E7EB; color: #4B5563; }
        
        .ticket-box { background: #F9FAFB; padding: 20px; border-radius: 12px; border: 2px dashed #D1D5DB; margin-top: 20px; }
        .receipt-box { background: #FFFFFF; padding: 20px; border-radius: 8px; border: 1px solid #E5E7EB; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; text-align: left; animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        #mainUi, #confirmUi, #waitUi, #receiptUi { display: none; }
        .active-ui { display: block !important; }
    </style>
</head>
<body>

<div class="wallet-card">
    <h2 style="color: var(--gcash); margin-top:0;">GCash Kiosk Automatic</h2>
    
    <div id="mainUi" class="active-ui">
        <input type="tel" id="mobile" placeholder="09XXXXXXXXX" maxlength="11">
        <input type="number" id="amount" placeholder="Amount (PHP)">
        
        <button class="btn-in" onclick="reviewTransaction('deposit')">CASH-IN (Deposit)</button>
        <button class="btn-out" onclick="reviewTransaction('withdraw')">CASH-OUT (Withdraw)</button>
        <div id="errorMsg" style="color:red; margin-top:10px; font-size:14px; min-height: 20px;"></div>
    </div>

    <div id="confirmUi">
        <h3 style="margin-top:0;">Review Details</h3>
        <p style="color:#6B7280; font-size:14px; margin-bottom: 20px;">Please ensure the mobile number and amount are exactly correct.</p>
        
        <div class="ticket-box" style="text-align: left; margin-top: 0; margin-bottom: 20px; border-color: var(--gcash);">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:#6B7280;">Action:</span> <strong id="confirmType" style="text-transform: uppercase;"></strong>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:#6B7280;">GCash Number:</span> <strong id="confirmMobile" style="font-size: 18px; color: var(--text);"></strong>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span style="color:#6B7280;">Amount:</span> <strong style="font-size: 18px; color: #10B981;">₱<span id="confirmAmt"></span></strong>
            </div>
        </div>

        <button class="btn-in" onclick="proceedTransaction()">Yes, Generate Ticket</button>
        <button class="btn-cancel" onclick="cancelTransaction()">No, Edit Details</button>
        <div id="confirmErrorMsg" style="color:red; margin-top:10px; font-size:14px; min-height: 20px;"></div>
    </div>

    <div id="waitUi">
        <h3>Show this to Cashier</h3>
        <p style="color:#6B7280; font-size:14px;">Please hand cash/send GCash to the cashier to complete.</p>
        <div class="ticket-box">
            <div style="font-size:12px; color:#6B7280; text-transform:uppercase;" id="waitType"></div>
            <div style="font-size:40px; font-weight:bold; color:var(--primary); letter-spacing: 5px;" id="displayCode"></div>
            <div style="font-size:18px; font-weight:bold; margin-top:10px;">₱<span id="displayAmt"></span></div>
        </div>
        <div style="margin-top:20px; font-size:14px; color:#059669;" id="pollingStatus">⏳ Waiting for cashier approval...</div>
    </div>

    <div id="receiptUi">
        <div style="color:#059669; font-size:40px; margin-bottom:10px;">✅</div>
        <h3 style="margin-top:0;">Transaction Complete</h3>
        <div class="receipt-box" id="finalReceipt"></div>
        <button class="btn-in" style="margin-top:20px;" onclick="location.reload()">Done / Next Customer</button>
    </div>
</div>

<script>
    let currentPoller = null;
    let pendingTx = null; // Stores the data temporarily while the user reviews it

    // 1. Intercept the click and show the confirmation screen
    function reviewTransaction(type) {
        const mobile = document.getElementById('mobile').value.trim();
        const amount = document.getElementById('amount').value;
        const errorEl = document.getElementById('errorMsg');
        
        errorEl.innerText = "";

        if(mobile.length !== 11) return errorEl.innerText = "Enter a valid 11-digit mobile number";
        if(!amount || amount <= 0) return errorEl.innerText = "Enter a valid amount";

        // Save data to our temporary object
        pendingTx = { type, amount, mobile, provider: 'GCash' };

        // Populate the confirmation UI
        document.getElementById('confirmType').innerText = type === 'deposit' ? 'Cash-In' : 'Cash-Out';
        document.getElementById('confirmType').style.color = type === 'deposit' ? '#059669' : '#DC2626';
        document.getElementById('confirmMobile').innerText = mobile;
        document.getElementById('confirmAmt').innerText = parseFloat(amount).toFixed(2);

        // Swap Screens
        document.getElementById('mainUi').classList.remove('active-ui');
        document.getElementById('confirmUi').classList.add('active-ui');
    }

    // 2. User clicked "No", send them back to fix it
    function cancelTransaction() {
        pendingTx = null; // Clear the temporary data
        document.getElementById('confirmUi').classList.remove('active-ui');
        document.getElementById('mainUi').classList.add('active-ui');
    }

    // 3. User clicked "Yes", actually send it to the server
    async function proceedTransaction() {
        const errorEl = document.getElementById('confirmErrorMsg');
        errorEl.innerText = "Generating ticket...";
        errorEl.style.color = "#6B7280";

        try {
            const res = await fetch('/transaction/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pendingTx)
            });
            
            const data = await res.json();
            
            if(res.ok) {
                document.getElementById('confirmUi').classList.remove('active-ui');
                document.getElementById('waitUi').classList.add('active-ui');
                
                document.getElementById('waitType').innerText = pendingTx.type === 'deposit' ? 'CASH-IN' : 'CASH-OUT';
                document.getElementById('displayCode').innerText = data.code;
                document.getElementById('displayAmt').innerText = pendingTx.amount;

                currentPoller = setInterval(() => checkStatus(data.reference_id), 2000);
            } else {
                errorEl.style.color = "red";
                errorEl.innerText = data.error || "Failed to generate ticket.";
            }
        } catch (error) {
            errorEl.style.color = "red";
            errorEl.innerText = "Cannot connect to server.";
        }
    }

    async function checkStatus(refId) {
        try {
            const res = await fetch(`/api/status/${refId}`);
            if (res.ok) {
                const data = await res.json();
                if (data.status === 'completed') {
                    clearInterval(currentPoller); 
                    showFinalReceipt(data);       
                }
            }
        } catch (error) {
            console.error("Polling error:", error);
        }
    }

    function showFinalReceipt(tx) {
        document.getElementById('waitUi').classList.remove('active-ui');
        document.getElementById('receiptUi').classList.add('active-ui');

        const color = tx.type === 'deposit' ? '#059669' : '#DC2626';
        
        let attachedImageHtml = '';
        if (tx.receipt_image) {
            attachedImageHtml = `
                <div style="margin-top: 15px; border-top: 1px dashed #D1D5DB; padding-top: 15px;">
                    <div style="font-size:12px; color:#6B7280; text-align:center; margin-bottom:10px;">ATTACHED PROOF OF TRANSACTION</div>
                    <img src="${tx.receipt_image}" style="width: 100%; border-radius: 8px; border: 1px solid #E5E7EB; box-sizing: border-box;">
                </div>
            `;
        }

        document.getElementById('finalReceipt').innerHTML = `
            <div style="font-size:16px; font-style:italic; color:#4B5563; margin-bottom: 20px; text-align:center; padding: 12px; background:#F3F4F6; border-radius:8px; font-weight:bold;">
                "${tx.greeting}"
            </div>

            <div style="text-align:center; font-weight:bold; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">OFFICIAL RECEIPT</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="color:#6B7280;">Type:</span> <strong style="color:${color}; text-transform:uppercase;">${tx.type}</strong>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="color:#6B7280;">Mobile:</span> <strong>${tx.mobile}</strong>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span style="color:#6B7280;">Amount:</span> <strong>₱${tx.amount.toFixed(2)}</strong>
            </div>
            <div style="font-size:10px; color:#9CA3AF; text-align:center;">
                Date: ${tx.date}<br>Ref: ${tx.reference_id}
            </div>
            
            ${attachedImageHtml}
        `;
    }
</script>
</body>
</html>
