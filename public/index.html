<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Top-Up Wallet Kiosk</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --card: #FFFFFF;
            --text: #1F2937;
            --gcash: #007EE5;
            --maya: #00D16C;
            --grab: #00B14F;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .wallet-card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }
        .header-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #E5E7EB;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 15px;
        }
        .provider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .provider-btn {
            padding: 15px 10px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .provider-btn:active { transform: scale(0.96); }
        .provider-btn.gcash { background: var(--gcash); }
        .provider-btn.maya { background: var(--maya); opacity: 0.6; }
        .provider-btn.grab { background: var(--grab); opacity: 0.6; grid-column: span 2; }
        .provider-btn.disabled { cursor: not-allowed; }
        
        #transactionArea {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-group {
            margin-bottom: 20px;
            padding: 15px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 1px;
        }
        input[type=tel] {
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
            border: 2px solid var(--gcash);
        }
        button.action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .btn-deposit { background: var(--primary); }
        .btn-withdraw { background: #1F2937; }
        
        #status {
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
            color: #059669;
        }
        
        /* Utility classes for the generated QR state */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #F9FAFB;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
        }
    </style>
</head>
<body>

<div class="wallet-card">
    <div class="header-title">Self-Service Kiosk</div>

    <div class="section-title">Select e-Wallet Provider</div>
    <div class="provider-grid">
        <button class="provider-btn gcash" onclick="selectProvider('gcash')">GCash</button>
        <button class="provider-btn maya disabled" onclick="showComingSoon('Maya')">Maya</button>
        <button class="provider-btn grab disabled" onclick="showComingSoon('GrabPay')">GrabPay</button>
    </div>

    <div id="transactionArea">
        <div class="section-title" id="activeProviderTitle" style="color: var(--gcash); text-align: center; font-size: 16px; margin-bottom: 15px;">Using GCash</div>
        
        <input type="tel" id="mobileNumber" placeholder="09XXXXXXXXX" maxlength="11">

        <div class="action-group">
            <input type="number" id="depositAmount" placeholder="Amount to Cash-In (Deposit)">
            <button class="action-btn btn-deposit" onclick="handleDeposit()">Generate Cash-In Ticket</button>
        </div>

        <div class="action-group">
            <input type="number" id="withdrawAmount" placeholder="Amount to Cash-Out (Withdraw)">
            <button class="action-btn btn-withdraw" onclick="handleWithdraw()">Generate Payment QR</button>
        </div>
    </div>

    <div id="status"></div>
</div>

<script>
    let selectedProvider = null;

    function selectProvider(provider) {
        if (provider === 'gcash') {
            selectedProvider = 'GCash';
            document.getElementById('transactionArea').style.display = 'block';
            showStatus("Enter mobile number and amount.", "#007EE5");
        }
    }

    function showComingSoon(providerName) {
        document.getElementById('transactionArea').style.display = 'none';
        showStatus(`${providerName} integration is coming soon!`, "#6B7280");
    }

    function showStatus(msg, color = "#059669") {
        const el = document.getElementById('status');
        el.style.color = color;
        el.innerHTML = msg; 
    }

    // CASH-IN FLOW: Still uses the manual OTP for the cashier
    async function handleDeposit() {
        const mobile = document.getElementById('mobileNumber').value;
        const amount = document.getElementById('depositAmount').value;
        
        if (!mobile || mobile.length !== 11) return showStatus("Enter a valid 11-digit mobile number", "#DC2626");
        if (!amount || amount <= 0) return showStatus("Enter a valid amount", "#DC2626");

        const res = await fetch('/deposit/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: amount, mobile: mobile, provider: selectedProvider })
        });
        
        const data = await res.json();
        
        if(res.ok) {
            document.getElementById('depositAmount').value = '';
            showStatus(`
                <div class="qr-container">
                    <div style="font-weight:bold; margin-bottom:5px;">Hand cash to cashier.</div>
                    <div style="font-size:12px; margin-bottom:10px;">Target: <strong>${mobile}</strong></div>
                    <div style="font-size:12px; color:#6B7280;">Provide this code to confirm:</div>
                    <span style="font-size:32px; font-weight:bold; letter-spacing:4px; color:var(--primary);">${data.otp}</span>
                </div>
            `, "#1F2937");
        }
    }

    // CASH-OUT FLOW: Uses the real Xendit Enterprise QR code
    async function handleWithdraw() {
        const mobile = document.getElementById('mobileNumber').value;
        const amount = document.getElementById('withdrawAmount').value;
        
        if (!mobile || mobile.length !== 11) return showStatus("Enter a valid 11-digit mobile number", "#DC2626");
        if (!amount || amount <= 0) return showStatus("Enter a valid amount", "#DC2626");

        showStatus("Connecting to GCash gateway...", "#4B5563");

        try {
            const res = await fetch('/withdraw/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amount, mobile: mobile, provider: selectedProvider })
            });

            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('withdrawAmount').value = '';
                
                // Turn Xendit's secure checkout link into a visible QR Code
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.checkout_url)}`;
                
                showStatus(`
                    <div class="qr-container">
                        <div style="color:#1F2937; font-weight:bold; margin-bottom:10px;">Scan to Pay with GCash</div>
                        <img src="${qrUrl}" alt="GCash QR Code" style="border-radius: 8px; border: 3px solid #007EE5; width: 200px; height: 200px; padding: 5px; background: white;">
                        <div style="font-size:12px; margin-top:10px; color:#6B7280;">Waiting for payment verification...</div>
                        <div style="font-size:10px; margin-top:5px; color:#9CA3AF;">REF: ${data.reference_id}</div>
                    </div>
                `, "#1F2937");

                // Note: The screen stays here. When the user scans and pays, 
                // Xendit will silently ping your backend webhook, and the Cashier 
                // will see the success receipt on their dashboard!
            } else {
                showStatus(data.error || "Transaction failed", "#DC2626");
            }
        } catch (error) {
            showStatus("Server error. Please try again.", "#DC2626");
        }
    }
</script>
</body>
</html>
