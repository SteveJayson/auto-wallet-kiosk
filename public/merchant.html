<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Dashboard</title>
    <style>
        :root {
            --merchant: #059669;
            --bg: #F3F4F6;
            --card: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #1F2937; margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 2px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: var(--merchant);
            color: white;
        }
        #dashboardArea { display: none; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<body>

<div class="dashboard-card">
    
    <div id="loginArea">
        <h2>Cashier Login</h2>
        <input type="password" id="pinInput" placeholder="Enter PIN">
        <button onclick="login()">Access System</button>
        <div id="loginStatus" style="color: red; text-align: center; margin-top: 10px;"></div>
    </div>

    <div id="dashboardArea">
        
        <h2>Approve Deposit</h2>
        <p style="text-align: center; color: #6B7280; font-size: 14px;">Enter customer's 6-digit OTP</p>
        <input type="text" id="otpInput" placeholder="000000" maxlength="6">
        <button onclick="confirmDeposit()">Credit Account (Receive Cash)</button>
        
        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #E5E7EB;">

        <h2>Process Cash-Out</h2>
        <p style="text-align: center; color: #6B7280; font-size: 14px;">Scan QR or type code (e.g. W-123456)</p>
        <input type="text" id="withdrawCodeInput" placeholder="W-000000">
        <button style="background: #1F2937;" onclick="confirmWithdraw()">Approve & Print Receipt</button>

        <div id="status"></div>

        <div id="receiptArea" style="display:none; margin-top:20px; background:#f9fafb; padding:15px; border:2px dashed #9CA3AF; font-family:monospace; text-align:left; font-size: 14px;">
             </div>

    </div>

</div>

<script>
    let sessionPin = null;

    async function login() {
        const pin = document.getElementById('pinInput').value;
        const res = await fetch('/merchant/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin: pin })
        });
        if (res.ok) {
            sessionPin = pin;
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('dashboardArea').style.display = 'block';
        } else {
            document.getElementById('loginStatus').innerText = "Incorrect PIN";
        }
    }

    async function confirmDeposit() {
        const otp = document.getElementById('otpInput').value;
        const statusEl = document.getElementById('status');
        
        statusEl.innerText = "Processing...";
        statusEl.style.color = "#4B5563";

        const res = await fetch('/merchant/confirm-deposit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin: sessionPin, otp: otp })
        });

        const data = await res.json();

        if (res.ok) {
            statusEl.innerText = "";
            document.getElementById('otpInput').value = '';
            
            // BUILD THE DIGITAL RECEIPT FOR CASH-IN
            const receiptHTML = `
                <div style="text-align:center; font-weight:bold; margin-bottom:10px;">--- OFFICIAL RECEIPT ---</div>
                <div>TYPE: <strong style="color:#059669;">CASH-IN</strong></div>
                <div>PROVIDER: <strong>${data.receipt.provider}</strong></div>
                <div>ACCOUNT: <strong>${data.receipt.mobile}</strong></div>
                <div>AMOUNT: <strong>₱${data.receipt.amount.toFixed(2)}</strong></div>
                <div>DATE: ${data.receipt.date}</div>
                <div style="font-size:10px; margin-top:10px; color:#6B7280; word-break:break-all;">REF: ${data.receipt.tx_id}</div>
                <div style="text-align:center; margin-top:15px; font-weight:bold; color:#059669;">✅ PAYMENT RECEIVED</div>
            `;
            
            document.getElementById('receiptArea').innerHTML = receiptHTML;
            document.getElementById('receiptArea').style.display = 'block';
        } else {
            statusEl.style.color = "red";
            statusEl.innerText = data.error;
            document.getElementById('receiptArea').style.display = 'none';
        }
    }

    async function confirmWithdraw() {
        const code = document.getElementById('withdrawCodeInput').value;
        const statusEl = document.getElementById('status');
        
        const res = await fetch('/merchant/confirm-withdraw', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin: sessionPin, code: code })
        });

        const data = await res.json();

        if (res.ok) {
            statusEl.innerText = "";
            document.getElementById('withdrawCodeInput').value = '';
            
            // BUILD THE DIGITAL RECEIPT
            const receiptHTML = `
                <div style="text-align:center; font-weight:bold; margin-bottom:10px;">--- OFFICIAL RECEIPT ---</div>
                <div>TYPE: <strong style="color:red;">CASH-OUT</strong></div>
                <div>PROVIDER: <strong>${data.receipt.provider}</strong></div>
                <div>ACCOUNT: <strong>${data.receipt.mobile}</strong></div>
                <div>AMOUNT: <strong>₱${data.receipt.amount.toFixed(2)}</strong></div>
                <div>DATE: ${data.receipt.date}</div>
                <div style="font-size:10px; margin-top:10px; color:#6B7280; word-break:break-all;">REF: ${data.receipt.tx_id}</div>
                <div style="text-align:center; margin-top:15px; font-weight:bold; color:#059669;">✅ HAND CASH TO CUSTOMER</div>
            `;
            
            // Show it on screen!
            document.getElementById('receiptArea').innerHTML = receiptHTML;
            document.getElementById('receiptArea').style.display = 'block';
        } else {
            statusEl.style.color = "red";
            statusEl.innerText = data.error;
            document.getElementById('receiptArea').style.display = 'none';
        }
    }
</script>

</body>
