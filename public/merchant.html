<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;}
        .dashboard { background: #1F2937; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 24px; font-weight: bold; text-align: center; box-sizing: border-box; letter-spacing: 2px;}
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: #10B981; color: white; transition: 0.1s;}
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="dashboard">
    <h2 style="margin-top:0;">Cashier Terminal</h2>
    <p style="color:#9CA3AF; margin-bottom:25px; font-size: 14px;">Verify the GCash transfer, then enter the customer's Ticket Code below to approve.</p>
    
    <input type="text" id="ticketCode" placeholder="000000" maxlength="6">
    <button onclick="approveTransaction()">APPROVE & PRINT RECEIPT</button>
    
    <div id="status" style="margin-top:20px; font-weight:bold; min-height: 45px;"></div>
</div>

<script>
    async function approveTransaction() {
        const code = document.getElementById('ticketCode').value.trim();
        const statusEl = document.getElementById('status');
        
        statusEl.style.color = "#EF4444"; 

        if(!code || code.length !== 6) {
            statusEl.innerText = "Please enter a valid 6-digit code";
            return;
        }
        
        statusEl.innerText = "Processing...";
        statusEl.style.color = "white";

        try {
            const res = await fetch('/merchant/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin: "1234", code: code }) 
            });

            const data = await res.json();

            if (res.ok) {
                statusEl.style.color = "#10B981"; 
                statusEl.innerHTML = `✅ Approved!<br><span style="font-size:14px; font-weight:normal; color:#9CA3AF;">Receipt automatically sent to customer screen.</span>`;
                document.getElementById('ticketCode').value = ""; 
                setTimeout(() => { statusEl.innerText = ""; }, 5000); 
            } else {
                statusEl.style.color = "#EF4444"; 
                statusEl.innerText = data.error || "Transaction failed.";
            }
        } catch (error) {
            console.error("Connection Error:", error);
            statusEl.style.color = "#EF4444"; 
            statusEl.innerText = "Cannot connect to server. Check your connection.";
        }
    }
</script>
</body>
</html>
