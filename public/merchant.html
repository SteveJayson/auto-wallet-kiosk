<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;}
        .dashboard { background: #1F2937; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input[type="text"] { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 24px; font-weight: bold; text-align: center; box-sizing: border-box; letter-spacing: 2px;}
        input[type="text"].greeting-input { font-size: 16px; font-weight: normal; letter-spacing: normal; text-align: left; background: #374151; color: white; margin-top: 15px;}
        
        /* New File Upload Styles */
        .file-upload-wrapper { margin-top: 10px; margin-bottom: 15px; text-align: left; }
        .file-upload-label { display: block; background: #374151; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; cursor: pointer; color: #9CA3AF; border: 1px dashed #6B7280; }
        .file-upload-label:hover { background: #4B5563; color: white; }
        input[type="file"] { display: none; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.1s;}
        button:active { transform: scale(0.98); }
        .btn-green { background: #10B981; }
        .btn-blue { background: #3B82F6; }
        
        .receipt-box { background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #374151; margin-top: 10px; text-align: left; }
        #receiptScreen { display: none; }
    </style>
</head>
<body>

<div class="dashboard" id="inputScreen">
    <h2 style="margin-top:0;">Cashier Terminal</h2>
    <p style="color:#9CA3AF; margin-bottom:25px; font-size: 14px;">Enter customer's OTP number inorder to proceed.</p>
    
    <input type="text" id="ticketCode" placeholder="000" maxlength="3">
    <button class="btn-green" onclick="approveTransaction()">VERIFY OTP</button>
    <div id="status" style="margin-top:20px; font-weight:bold; min-height: 20px;"></div>
</div>

<div class="dashboard" id="receiptScreen">
    <h3 style="margin-top:0; margin-bottom:5px; color:#10B981;">✅ OTP Verified</h3>
    <div class="receipt-box" id="merchantReceipt"></div>
    
    <div class="file-upload-wrapper">
        <label for="receiptImage" class="file-upload-label" id="fileLabel">
            📸 Attach GCash Screenshot (Optional)
        </label>
        <input type="file" id="receiptImage" accept="image/*" onchange="updateFileName()">
    </div>
    
    <input type="text" id="greetingMsg" class="greeting-input" placeholder="Type a greeting (Optional)">
    <button class="btn-blue" onclick="sendToCustomer()">SEND TO CUSTOMER SCREEN</button>
    
    <div id="sendStatus" style="margin-top:15px; font-weight:bold; min-height: 20px; color:#10B981;"></div>
</div>

<script>
    let currentRefId = ""; 

    function updateFileName() {
        const fileInput = document.getElementById('receiptImage');
        const label = document.getElementById('fileLabel');
        if (fileInput.files.length > 0) {
            label.innerHTML = `✅ Attached: ${fileInput.files[0].name}`;
            label.style.borderColor = "#10B981";
            label.style.color = "#10B981";
        }
    }

    // Magic trick: Converts an image file into a Base64 text string
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function approveTransaction() {
        const code = document.getElementById('ticketCode').value.trim();
        const statusEl = document.getElementById('status');
        statusEl.style.color = "#EF4444"; 

        if(!code || code.length !== 3) return statusEl.innerText = "Please enter a valid 3-digit code";
        statusEl.innerText = "Verifying...";
        statusEl.style.color = "white";

        try {
            const res = await fetch('/merchant/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin: "1234", code: code }) 
            });
            const data = await res.json();

            if (res.ok) {
                currentRefId = data.receipt.reference_id;
                const tx = data.receipt;
                const color = tx.type === 'deposit' ? '#10B981' : '#EF4444';
                
                document.getElementById('merchantReceipt').innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span style="color:#9CA3AF;">Type:</span> <strong style="color:${color}; text-transform:uppercase;">${tx.type}</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span style="color:#9CA3AF;">Mobile:</span> <strong>${tx.mobile}</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <span style="color:#9CA3AF;">Amount:</span> <strong>₱${tx.amount.toFixed(2)}</strong>
                    </div>
                `;
                
                document.getElementById('inputScreen').style.display = 'none';
                document.getElementById('receiptScreen').style.display = 'block';
                document.getElementById('ticketCode').value = ""; 
                statusEl.innerText = "";
            } else {
                statusEl.innerText = data.error || "Transaction failed.";
            }
        } catch (error) {
            statusEl.innerText = "Cannot connect to server.";
        }
    }

    async function sendToCustomer() {
        const greeting = document.getElementById('greetingMsg').value.trim();
        const fileInput = document.getElementById('receiptImage');
        const statusEl = document.getElementById('sendStatus');
        
        statusEl.innerText = "Sending... (may take a second for images)";
        statusEl.style.color = "#10B981";

        let base64String = null;
        if (fileInput.files.length > 0) {
            base64String = await fileToBase64(fileInput.files[0]);
        }

        try {
            const res = await fetch('/merchant/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    pin: "1234", 
                    reference_id: currentRefId, 
                    greeting: greeting,
                    receipt_image: base64String // Attach the encoded image!
                }) 
            });

            if (res.ok) {
                statusEl.innerText = "✅ Sent to Customer!";
                setTimeout(() => {
                    // Reset everything
                    document.getElementById('receiptScreen').style.display = 'none';
                    document.getElementById('inputScreen').style.display = 'block';
                    document.getElementById('greetingMsg').value = "";
                    fileInput.value = ""; // Clear file
                    document.getElementById('fileLabel').innerHTML = "📸 Attach GCash Screenshot (Optional)";
                    document.getElementById('fileLabel').style.borderColor = "#6B7280";
                    document.getElementById('fileLabel').style.color = "#9CA3AF";
                    statusEl.innerText = "";
                }, 2000);
            }
        } catch (error) {
            statusEl.innerText = "Failed to send.";
            statusEl.style.color = "#EF4444";
        }
    }
</script>
</body>
</html>
